<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Escola Sergipana - Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>

    <section id="cadastro">
        <header class="header-internal">
            <div class="icon-box-static">
                <div class="icon-car"></div>
            </div>
            <div class="header-text">
                <h1>AUTO ESCOLA<br>SERGIPANA</h1>
            </div>
        </header>

        <main class="form-padding">
            <form action="#servicos">
                <div class="input-group">
                    <label>NOME COMPLETO</label>
                    <input type="text" placeholder="Digite seu nome" required>
                </div>
                <div class="input-group">
                    <label>CPF</label>
                    <input type="text" placeholder="000.000.000-00" required>
                </div>
                <div class="input-group">
                    <label>TELEFONE</label>
                    <input type="tel" placeholder="(00) 00000-0000" required>
                </div>
                <div class="input-group">
                    <label>ENDEREÇO</label>
                    <input type="text" placeholder="Rua, Número, Bairro" required>
                </div>
                <div class="input-group">
                    <label>EMAIL</label>
                    <input type="email" placeholder="exemplo@email.com" required>
                </div>
                
                <div style="display: flex; justify-content: flex-end; margin-top: 15px;">
                    <button type="submit" class="btn-universal">
                        <span class="check-circle">✓</span> CONFIRMAR
                    </button>
                </div>
            </form>
        </main>
    </section>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição CNH</title>
    <link rel="stylesheet" href="inscricao.css">
</head>
<body>

    <section id="inscricao">
        <header class="header-internal">
            <div class="icon-box-static">
                <div class="icon-car"></div>
            </div>
            <div class="header-text">
                <h1>NOSSOS SERVIÇOS</h1>
                <p>INSCRIÇÃO PARA CNH</p>
            </div>
        </header>

        <main class="form-padding">
            <form action="#home">
                <div class="form-grid">
                    <div class="input-group">
                        <label>CPF:</label>
                        <input type="text" required>
                    </div>
                    
                    <div class="input-group">
                        <label>NÚMERO DO DOCUMENTO:</label>
                        <input type="text" required>
                    </div>
                    
                    <div class="input-group">
                        <label>TIPO DE DOCUMENTO:</label>
                        <input type="text" required>
                    </div>
                    
                    <div class="input-group">
                        <label>UF EMISSÃO:</label>
                        <input type="text" required>
                    </div>
                    
                    <div class="input-group">
                        <label>ÓRGÃO EMISSOR:</label>
                        <input type="text" required>
                    </div>
                    
                    <div style="display: flex; align-items: flex-end;">
                        <button type="submit" class="btn-grid-confirm">
                            <span class="check-circle">✓</span> CONFIRMAR
                        </button>
                    </div>
                </div>
            </form>
        </main>
    </section>

</body>
</html>

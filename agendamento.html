<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Escola Sergipana - Agendamento</title>
    <link rel="stylesheet" href="agendamento.css">
</head>
<body>

    <section id="agendamento">
        <header class="header-internal">
            <div class="icon-box-static">
                <div class="icon-car"></div>
            </div>
            <div class="header-text">
                <h1>NOSSOS SERVIÇOS</h1>
                <p style="color: white; font-weight: bold; margin-left: 15px;">AGENDAMENTO</p>
            </div>
        </header>

        <main class="form-padding">
            <form action="#acompanhamento">
                <div class="form-grid" style="margin-top: 40px;">
                    <div class="input-group">
                        <label>NÚMERO DO CPF</label>
                        <input type="text" placeholder="000.000.000-00" required>
                    </div>
                    <div class="input-group">
                        <label>TIPO DE AGENDAMENTO</label>
                        <select required>
                            <option value="" disabled selected>Selecione uma opção</option>
                            <option value="Processo de Habilitação">PROCESSO DE HABILITAÇÃO</option>
                            <option value="Coleta Biometria">COLETA DOS DADOS BIOMÉTRICOS - CAV</option>
                            <option value="Recebimento Veiculo">RECEBIMENTO DE DOCUMENTO DE VEÍCULO</option>
                            <option value="Recebimento Habilitacao">RECEBIMENTO DE DOCUMENTO DE HABILITAÇÃO</option>
                            <option value="Processo Veiculos">PROCESSO DE VEÍCULOS</option>
                            <option value="Vistoria Detran">VISTORIA EM UMA UNIDADE DO DETRAN/SE</option>
                            <option value="Vistoria Privada">VISTORIA EM UMA EMPRESA PRIVADA</option>
                            <option value="Avaliacao Psicologica">AVALIAÇÃO PSICOLÓGICA</option>
                            <option value="Exame Medico">EXAME MÉDICO</option>
                            <option value="Exame Teorico">EXAME TEÓRICO</option>
                            <option value="Exame Pratico">EXAME PRÁTICO</option>
                        </select>
                    </div>
                </div>
                
                <div style="display: flex; justify-content: flex-end; margin-top: 30px;">
                    <button type="submit" class="btn-grid-confirm">
                        <span class="check-circle">✓</span> CONFIRMAR
                    </button>
                </div>
            </form>
        </main>
    </section>

</body>
</html>
